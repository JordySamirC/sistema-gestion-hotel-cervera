spring.application.name=hotel_cervera_api
server.port=${SERVER_PORT:8080}

spring.config.import=optional:file:.env[.properties]
spring.docker.compose.enabled=false

# Configuración de Base de Datos PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Configuración JWT
jwt.secret=${JWT_SECRET:secret}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Configuración Brevo (email)
brevo.api-key=${BREVO_API_KEY:mock-key}
brevo.sender-email=${BREVO_SENDER_EMAIL:admin@example.com}
brevo.sender-name=${BREVO_SENDER_NAME:Hotel}

# URL base de la aplicación frontend (para magic links)
app.base-url=${APP_BASE_URL:http://localhost:4200}

server.address=0.0.0.0
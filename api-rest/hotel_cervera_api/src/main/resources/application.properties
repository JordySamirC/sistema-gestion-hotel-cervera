spring.application.name=hotel_cervera_api
server.port=${SERVER_PORT}

spring.config.import=optional:file:.env[.properties]
spring.docker.compose.enabled=false

# Configuración de Base de Datos PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hotel_cervera_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1984GeorgeOrwell}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Configuración JWT
jwt.secret=${JWT_SECRET:miClaveSecretaSuperSeguraParaJWT2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Configuración Brevo (email)
brevo.api-key=${BREVO_API_KEY:mock_key}
brevo.sender-email=${BREVO_SENDER_EMAIL:cjordy2001@gmail.com}
brevo.sender-name=${BREVO_SENDER_NAME:Hotel Cervera}

# URL base de la aplicación frontend (para magic links)
app.base-url=${APP_BASE_URL:http://localhost}

server.address=0.0.0.0
secrets:
  db_password:
    file: ./docker/secrets/db_password.txt
  jwt_secret:
    file: ./docker/secrets/jwt_secret.txt
  brevo_api_key:
    file: ./docker/secrets/brevo_api_key.txt

networks:
  backend_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

services:

  # ─── BASE DE DATOS ───────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: hotel_cervera_db
    restart: unless-stopped
    user: "70:70"
    networks:
      - db_net
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups:ro
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── BACKEND SPRING BOOT ─────────────────────────────────────────
  backend:
    build:
      context: ./api-rest/hotel_cervera_api
      dockerfile: Dockerfile
      target: runtime
    container_name: hotel_cervera_backend
    restart: unless-stopped
    user: "1001:1001"
    networks:
      - backend_net
      - db_net
    ports:
      - "${HOST_BACKEND_PORT}:${SERVER_PORT}"
    environment:
      SERVER_PORT: ${SERVER_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
      APP_BASE_URL: ${APP_BASE_URL}
    secrets:
      - db_password
      - jwt_secret
      - brevo_api_key
    volumes:
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
        reservations:
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── FRONTEND ANGULAR + NGINX ────────────────────────────────────
  frontend:
    build:
      context: ./web-app
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:${HOST_BACKEND_PORT}
    container_name: hotel_cervera_frontend
    restart: unless-stopped
    networks:
      - backend_net
    ports:
      - "${HOST_FRONTEND_PORT}:8080"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
